# Secret-scan configuration.
#
# Starts from gitleaks' full default rule set and only ever *adds* verified
# false positives. Nothing here weakens detection of a real credential; the
# commit that introduced this file proves it with planted secrets.

[extend]
useDefault = true

# Cargo.lock is generated by cargo and holds nothing but crate names,
# versions, registry URLs, and SHA-256 checksums. The low-confidence
# `generic-api-key` heuristic fires inside it because openmls depends on a
# crate literally named `libcrux-secrets`: the rule sees the keyword
# "secrets" and reports the next entry in the dependency list, the crate name
# `libcrux-sha3`, as a credential.
#
# The allowlist is pinned to that shape: a lowercase `libcrux-*` crate name,
# and only inside a Cargo.lock. A planted AWS key or a generic high-entropy
# token still breaks the build, in Cargo.lock and everywhere else.
[[allowlists]]
description = "generic-api-key false positive on libcrux crate names in Cargo.lock"
condition = "AND"
paths = ['''(^|/)Cargo\.lock$''']
regexes = ['''^libcrux-[a-z0-9-]+$''']
