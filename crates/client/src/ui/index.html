<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enclave</title>
<style>
  :root {
    --rail: #1e1f22;
    --sidebar: #2b2d31;
    --chat: #313338;
    --input: #383a40;
    --hover: #35373c;
    --text: #dbdee1;
    --muted: #949ba4;
    --bright: #f2f3f5;
    --accent: #5865f2;
    --accent-hover: #4752c4;
    --online: #23a55a;
    --away: #f0b232;
    --danger: #da373c;
    --border: rgba(255, 255, 255, 0.06);
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  /* Make the `hidden` attribute authoritative: the view containers set an
     ID-specificity `display`, which would otherwise beat the UA `[hidden]`
     rule and leave a "hidden" view visible (login/app view never switch). */
  [hidden] { display: none !important; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--chat);
    color: var(--text);
    font: 15px/1.4 "gg sans", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  button {
    font: inherit;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    color: var(--bright);
    background: var(--input);
    padding: 9px 14px;
    transition: background-color 120ms ease;
  }
  button:hover { background: var(--hover); }
  button.primary { background: var(--accent); }
  button.primary:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: default; }
  input, select {
    font: inherit;
    background: var(--rail);
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text);
    padding: 10px 11px;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.02em; }
  .error { color: #f38688; font-size: 13px; min-height: 18px; }

  /* Login view */
  #login-view { height: 100%; display: flex; align-items: center; justify-content: center; }
  .login-card {
    width: 420px;
    max-width: calc(100% - 32px);
    background: var(--sidebar);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .login-card h1 { margin: 0; font-size: 22px; letter-spacing: -0.01em; }
  .login-card .sub { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
  .login-card label { margin-top: 8px; }
  .login-card .row { display: flex; gap: 8px; margin-top: 14px; }
  .login-card .row button { flex: 1; }
  .server-adv { margin-top: 14px; }
  .server-adv summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  .server-adv input { margin-top: 6px; }

  /* App view */
  #app-view { height: 100%; display: flex; }
  .sidebar {
    width: 260px;
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-header { padding: 16px; font-weight: 700; font-size: 15px; border-bottom: 1px solid var(--border); }
  .sidebar-actions { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .sidebar-actions #start-group { width: 100%; }
  .add-friend-row { display: flex; gap: 6px; }
  .add-friend-row input { flex: 1; }
  .add-friend-row button { width: 40px; padding: 0; }

  .friends { list-style: none; margin: 0; padding: 4px 8px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .friends li { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 4px; font-size: 14px; }
  .friends li:hover { background: var(--hover); }
  .friends .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
  .friends li.online .dot { background: var(--online); }
  .friends li.away .dot { background: var(--away); }
  .friends .status { margin-left: auto; color: var(--muted); font-size: 12px; }

  .user-panel { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--rail); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex: none; text-transform: uppercase; }
  .user-name { font-weight: 600; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-select { width: auto; padding: 5px 6px; font-size: 12px; }
  .user-panel #logout { padding: 6px 10px; font-size: 12px; }

  .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--chat); }
  .chat-header { height: 48px; display: flex; align-items: center; gap: 12px; padding: 0 16px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .chat-header .safety { margin-left: auto; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); }
  .log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 70ch; }
  .msg .who { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
  .msg.self { align-self: flex-end; text-align: right; }
  .msg .body { display: inline-block; padding: 8px 12px; background: var(--input); border-radius: var(--radius); white-space: pre-wrap; word-break: break-word; }
  .msg.self .body { background: var(--accent); color: #fff; }
  .msg.system .body { background: transparent; padding: 0; color: var(--muted); font-size: 13px; }

  .composer { padding: 12px 16px 16px; }
  .composer input { background: var(--input); border-radius: var(--radius); padding: 12px 14px; }
  .status { padding: 0 16px 8px; font-size: 12px; color: var(--muted); min-height: 16px; }
  .status.err { color: #f38688; }
</style>
</head>
<body>
  <div id="login-view">
    <div class="login-card">
      <h1>Enclave</h1>
      <p class="sub">end-to-end encrypted</p>
      <label for="login-username">Username</label>
      <input id="login-username" spellcheck="false" autocomplete="off" />
      <label for="login-password">Password</label>
      <input id="login-password" type="password" />
      <div class="row">
        <button id="login-btn" class="primary">Log in</button>
        <button id="register-btn">Create account</button>
      </div>
      <details class="server-adv">
        <summary>Server</summary>
        <input id="login-server" value="ws://127.0.0.1:8443" spellcheck="false" />
      </details>
      <div id="login-error" class="error"></div>
    </div>
  </div>

  <div id="app-view" hidden>
    <aside class="sidebar">
      <div class="sidebar-header">Direct messages</div>
      <div class="sidebar-actions">
        <button id="start-group">Start a group</button>
        <div class="add-friend-row">
          <input id="friend" placeholder="Add friend by name" spellcheck="false" />
          <button id="add-friend" title="Add friend">+</button>
        </div>
      </div>
      <ul id="friends" class="friends"></ul>
      <div class="user-panel">
        <div class="avatar" id="avatar"></div>
        <div class="user-name" id="me-name"></div>
        <select id="presence" class="status-select">
          <option value="online">Online</option>
          <option value="away">Away</option>
          <option value="offline">Invisible</option>
        </select>
        <button id="logout">Log out</button>
      </div>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <span id="chat-title">No conversation yet</span>
        <span class="safety" id="safety" title="Read this aloud with your friends to verify no one is listening"></span>
      </header>
      <div id="log" class="log"></div>
      <form id="composer" class="composer">
        <input id="message" placeholder="Message" autocomplete="off" disabled />
      </form>
      <div id="status" class="status"></div>
    </main>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const send = (cmd) => window.ipc.postMessage(JSON.stringify(cmd));

  let inGroup = false;

  function serverUrl() { return $("login-server").value.trim() || "ws://127.0.0.1:8443"; }

  function doAuth(create) {
    const username = $("login-username").value.trim();
    const password = $("login-password").value;
    $("login-error").textContent = "";
    if (!username || !password) { $("login-error").textContent = "Enter a username and password."; return; }
    if (create && password.length < 12) { $("login-error").textContent = "Password must be at least 12 characters."; return; }
    send({ type: create ? "CreateAccount" : "Login", server: serverUrl(), username, password });
  }
  $("login-btn").addEventListener("click", () => doAuth(false));
  $("register-btn").addEventListener("click", () => doAuth(true));
  $("login-password").addEventListener("keydown", (e) => { if (e.key === "Enter") doAuth(false); });

  $("logout").addEventListener("click", () => send({ type: "Logout" }));
  $("start-group").addEventListener("click", () => send({ type: "StartGroup" }));
  $("add-friend").addEventListener("click", () => {
    const user = $("friend").value.trim();
    if (user) { send({ type: "AddFriend", user }); upsertFriend(user, "offline"); $("friend").value = ""; }
  });
  $("presence").addEventListener("change", (e) => send({ type: "SetPresence", status: e.target.value }));
  $("composer").addEventListener("submit", (e) => {
    e.preventDefault();
    const input = $("message");
    if (input.value.trim()) { send({ type: "SendText", text: input.value }); input.value = ""; }
  });

  function addMessage(kind, who, text) {
    const el = document.createElement("div");
    el.className = "msg " + kind;
    if (who) { const w = document.createElement("div"); w.className = "who"; w.textContent = who; el.appendChild(w); }
    const b = document.createElement("div"); b.className = "body"; b.textContent = text; el.appendChild(b);
    const log = $("log"); log.appendChild(el); log.scrollTop = log.scrollHeight;
  }

  function upsertFriend(user, status) {
    let li = document.querySelector('#friends li[data-user="' + CSS.escape(user) + '"]');
    if (!li) {
      li = document.createElement("li");
      li.dataset.user = user;
      li.innerHTML = '<span class="dot"></span><span class="fname"></span><span class="status"></span>';
      li.querySelector(".fname").textContent = user;
      $("friends").appendChild(li);
    }
    li.className = status;
    li.querySelector(".status").textContent = status;
  }

  function setStatus(message, isError) {
    const s = $("status");
    s.textContent = message || "";
    s.className = "status" + (isError ? " err" : "");
  }

  function showApp(username) {
    $("login-view").hidden = true;
    $("app-view").hidden = false;
    $("me-name").textContent = username;
    $("avatar").textContent = username.slice(0, 1);
  }
  function showLogin() {
    $("app-view").hidden = true;
    $("login-view").hidden = false;
    inGroup = false;
    $("friends").innerHTML = "";
    $("log").innerHTML = "";
    $("safety").textContent = "";
    $("chat-title").textContent = "No conversation yet";
    $("message").disabled = true;
    $("login-password").value = "";
  }

  window.onEnclaveEvent = (ev) => {
    switch (ev.type) {
      case "LoggedIn":
        showApp(ev.username);
        if (ev.safety_number) { inGroup = true; $("safety").textContent = ev.safety_number; }
        break;
      case "LoggedOut":
        showLogin();
        break;
      case "Membership":
        inGroup = true;
        $("message").disabled = false;
        $("chat-title").textContent = "Group";
        if (ev.safety_number) $("safety").textContent = ev.safety_number;
        break;
      case "Text":
        addMessage(ev.mine ? "self" : "", ev.mine ? null : ev.from, ev.text);
        break;
      case "Presence":
        upsertFriend(ev.user, ev.status);
        break;
      case "Status":
        // Auth errors show on the login card; in-app errors on the status bar.
        if ($("login-view").hidden) setStatus(ev.message, ev.error);
        else $("login-error").textContent = ev.message;
        break;
    }
  };
</script>
</body>
</html>
