name: CI

on:
  push:
    branches: [main]
  pull_request:

# Security and quality gates. A failure here breaks the build; nothing merges
# past a new HIGH advisory, a lint, or a leaked secret. See DevSecOps notes in
# THREAT_MODEL.md.
jobs:
  build-test:
    name: Build, lint, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Linux system libraries (WebKitGTK, ALSA, PipeWire)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang nasm cmake pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libasound2-dev libpipewire-0.3-dev
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  audit:
    name: Dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Scan for known-vulnerable dependencies
        # RUSTSEC-2026-0124 (libcrux-chacha20poly1305 DoS panic) is waived: it is
        # verified not exploitable in Enclave (not compiled on the Windows client
        # target; our AES-128-GCM ciphersuite never calls libcrux's ChaCha open;
        # the server has no libcrux dep). No upstream fix exists yet -- the fix is
        # exact-pinned out via openmls_rust_crypto -> hpke-rs -> libcrux-aead
        # 0.0.7. See THREAT_MODEL.md. Every OTHER advisory still breaks the build.
        #
        # RUSTSEC-2026-0194/0195 (quick-xml parsing DoS) are waived: quick-xml is
        # only a build-time dependency of the wayland-scanner proc-macro, which
        # parses trusted vendored protocol XML during compilation and ships in no
        # binary. wayland-scanner 0.31.10 (latest) still pins quick-xml 0.39, so
        # no upgrade path exists yet. See THREAT_MODEL.md; drop these ignores when
        # wayland-scanner releases against quick-xml >= 0.41.
        #
        # RUSTSEC-2026-0207/0208/0209/0211/0212 are the libcrux-{sha3,aesgcm,secrets}
        # crates pulled transitively by openmls's crypto provider
        # (openmls_rust_crypto -> hpke-rs -> libcrux-*), exact-pinned with no
        # upgrade path yet (same chain as 0124). Not remotely reachable in
        # Enclave's model: the relay never decrypts (so the AES-GCM tag-timing /
        # AAD-length issues have no attacker-observable oracle), 0212 is Aarch64
        # -only and 0207/0208 are SHAKE correctness/DoS bugs of the 0124 class. See
        # THREAT_MODEL.md; drop these when openmls ships a provider on patched
        # libcrux.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0124
          --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
          --ignore RUSTSEC-2026-0207 --ignore RUSTSEC-2026-0208
          --ignore RUSTSEC-2026-0209 --ignore RUSTSEC-2026-0211
          --ignore RUSTSEC-2026-0212

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The gitleaks binary is MIT-licensed and scans offline. The wrapper
      # action instead calls the GitHub API to decide whether it needs a
      # licence, and fails the build when that call is rate-limited -- a
      # security gate that breaks for non-security reasons gets ignored, so
      # we run the scanner itself. Rules: gitleaks defaults, plus the
      # allowlist in .gitleaks.toml (one verified false positive).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.28.0
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan the full history for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1
